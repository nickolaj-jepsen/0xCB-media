name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-workspace:
    name: clippy (host + proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libudev-dev libdbus-1-dev libpipewire-0.3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo clippy -p host -p proto --all-targets -- -D warnings

  clippy-firmware:
    name: clippy (firmware, thumbv6m)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: firmware
      # firmware/.cargo/config.toml pins target=thumbv6m-none-eabi; we must cd
      # into firmware/ so Cargo picks that config up (--manifest-path alone
      # doesn't reliably change the config-search root across all Cargo versions).
      - run: cd firmware && cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test (host + proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libudev-dev libdbus-1-dev libpipewire-0.3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo test -p host -p proto --all-targets

  nix-build:
    name: nix build (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [host, firmware]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v16
        with:
          name: 0xcbmedia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Skip pushing on PRs from forks (no secret access).
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - run: nix build --print-build-logs .#${{ matrix.package }}

  nix-flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v16
        with:
          name: 0xcbmedia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - run: nix flake check --print-build-logs
